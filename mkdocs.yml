site_name: JJs Wiki
site_description: Driver installation guides and more!
site_author: Joel Skerman

theme:
  name: material
  features:
    - content.code.copy

nav:
  - Home: index.md
  - Driver Installation Guide: driver-installation.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

plugins:
  - search
  - awesome-pages

extra_javascript:
  - js/open_in_new_tab.js