site_name: JJs Wiki
site_description: Driver installation guides and more!
site_author: Joel Skerman

theme:
  name: material

  features:
    - content.code.copy

  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Driver Installation Documentation: driver-installation.md
  - Installing CAB file drivers: cab-file-driver-installation.md
  - todo: todo.md
  - Useful Links: Useful-Links.md
  - Panasonic:
      - FZ-G1 Guide: Panasonic/panasonic-fzg1.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

plugins:
  - search
  - awesome-pages

extra_javascript:
  - js/open_in_new_tab.js
  - js/device.js

extra_css:
  - stylesheets/extra.css
